<label
  class="checkbox"
  [class.checkbox--checked]="checked()"
  [class.checkbox--disabled]="disabled()"
>
  <input
    type="checkbox"
    [id]="inputId()"
    [checked]="checked()"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel() || null"
    (change)="toggle()"
    (blur)="handleBlur()"
  />

  <span class="checkbox-control" aria-hidden="true">
  </span>

  @if (label()) {
    <span class="label">
      {{ label() }}
    </span>
  }
</label>
